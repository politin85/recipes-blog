<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מתכונים מחושבים — המטבח פוגש טכנולוגיה</title>
  <meta name="description" content="מתכונים מחושבים — המטבח פוגש טכנולוגיה" />
  <meta property="og:type"        content="website" />
  <meta property="og:title"       content="מתכונים מחושבים — המטבח פוגש טכנולוגיה" />
  <meta property="og:description" content="מתכונים מחושבים — המטבח פוגש טכנולוגיה" />
  <meta property="og:url"         content="https://politin85.github.io/recipes-blog/" />
  <meta property="og:locale"      content="he_IL" />
  <meta name="twitter:card"       content="summary" />
  <link rel="icon" href="favicon.ico" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#C2622F" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Secular+One&family=Rubik:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --terracotta:  #C2622F;
      --terracotta-light: #D97B4A;
      --terracotta-pale:  #F5E2D4;
      --olive:       #6B7A3A;
      --olive-light: #8A9A50;
      --sand:        #F0E4CE;
      --sand-dark:   #E2CDA8;
      --cream:       #FAF6F0;
      --ink:         #2C1F14;
      --ink-light:   #5A4030;
      --ink-muted:   #6B5042;
      --white:       #FFFFFF;
      --shadow-sm: 0 2px 8px rgba(44,31,20,.08);
      --shadow-md: 0 6px 24px rgba(44,31,20,.12);
      --shadow-lg: 0 16px 48px rgba(44,31,20,.16);
      --radius:    12px;
      --radius-lg: 20px;
      /* ── Spacing scale (base-4, rem) ── */
      --space-1:  0.25rem;  /*  4px */
      --space-2:  0.5rem;   /*  8px */
      --space-3:  0.75rem;  /* 12px */
      --space-4:  1rem;     /* 16px */
      --space-5:  1.25rem;  /* 20px */
      --space-6:  1.5rem;   /* 24px */
      --space-8:  2rem;     /* 32px */
      --space-10: 2.5rem;   /* 40px */
      --space-12: 3rem;     /* 48px */
      --space-14: 3.5rem;   /* 56px */
      --space-16: 4rem;     /* 64px */
      --space-20: 5rem;     /* 80px */
      /* ── Type scale ── */
      --font-display: 'Secular One', sans-serif;
      --font-body:    'Rubik', sans-serif;
      --font-serif:   'Noto Serif Hebrew', serif;
      --text-xs:   0.75rem;    /* 12px */
      --text-sm:   0.875rem;   /* 14px */
      --text-base: 1rem;       /* 16px */
      --text-lg:   1.125rem;   /* 18px */
      --text-xl:   1.25rem;    /* 20px */
      --text-2xl:  1.5rem;     /* 24px */
      --text-3xl:  2rem;       /* 32px */
      --text-4xl:  clamp(2rem, 4.5vw, 3.2rem);
      --leading-tight:   1.2;
      --leading-normal:  1.6;
      --leading-relaxed: 1.8;
    }

    html, body { overflow-x: hidden; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── Header ── */ 
    header {
      background: var(--terracotta);
      padding: 0 var(--space-5);
      position: fixed;
      top: 0; right: 0; left: 0;
      z-index: 1000;
      box-shadow: 0 2px 12px rgba(44,31,20,.2);
    }
    body { padding-top: 64px; }
    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      gap: var(--space-2);
    }
    .logo {
      font-family: var(--font-display);
      font-size: var(--text-2xl);
      font-weight: 700;
      color: var(--white);
      text-decoration: none;
      letter-spacing: 0.01em;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .logo span { color: var(--sand); }
    .nav-link {
      color: rgba(255,255,255,.85); text-decoration: none;
      font-size: .9rem; display: flex; align-items: center; gap: var(--space-2);
      padding: var(--space-2) var(--space-4); border-radius: 50px;
      border: 1.5px solid rgba(255,255,255,.35);
      transition: all .2s; white-space: nowrap; flex-shrink: 0;
    }
    .nav-link:hover { background: rgba(255,255,255,.15); color: var(--white); border-color: rgba(255,255,255,.6); }
    @media (max-width: 768px) {
      .logo { font-size: 1.2rem; }
      .nav-link { font-size: var(--text-xs); padding: var(--space-1) var(--space-3); }
    }
    @media (max-width: 480px) {
      .logo { font-size: var(--text-base); }
      .nav-link { font-size: .7rem; padding: var(--space-1) .55rem; }
    }
    @media (max-width: 380px) {
      .nav-link .nav-text { display: none; }
    }

    /* ── Hero ── */
    .hero {
      background-color: var(--ink);
      background-size: cover;
      background-position: center;
      width: 100%;
      aspect-ratio: 16 / 5;
      min-height: 180px;
      max-height: 420px;
      position: relative;
      display: flex;
      align-items: flex-end;
    }
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        transparent 25%,
        rgba(44, 31, 20, 0.45) 65%,
        rgba(44, 31, 20, 0.78) 100%
      );
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: var(--space-8) var(--space-10);
      gap: var(--space-2);
    }
    .hero-tagline {
      font-family: var(--font-display);
      font-size: clamp(1.3rem, 3vw, 2.2rem);
      color: var(--white);
      line-height: var(--leading-tight);
      text-shadow: 0 2px 10px rgba(0,0,0,.3);
    }
    .hero-subtitle {
      font-size: clamp(.8rem, 1.4vw, 1rem);
      color: rgba(255, 255, 255, .75);
      font-weight: 300;
      letter-spacing: .03em;
    }
    @media (max-width: 640px) {
      .hero-overlay { padding: var(--space-5) var(--space-6); }
    }

    /* ── Search bar ── */
    .search-wrap {
      position: relative;
      max-width: 560px;
      margin: 0 auto var(--space-5);
    }
    .search-wrap input {
      width: 100%;
      padding: var(--space-4) 3.2rem var(--space-4) var(--space-5);
      border-radius: 50px;
      border: 1.5px solid var(--sand-dark);
      font-family: var(--font-body);
      font-size: var(--text-base);
      background: var(--white);
      color: var(--ink);
      box-shadow: var(--shadow-sm);
      outline: none;
      direction: rtl;
      transition: border-color .2s, box-shadow .2s;
    }
    .search-wrap input::placeholder { color: var(--ink-muted); }
    .search-wrap input:focus {
      border-color: var(--terracotta);
      box-shadow: 0 0 0 3px var(--terracotta-pale);
    }
    .search-icon {
      position: absolute;
      left: 1.1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--ink-muted);
      pointer-events: none;
    }

    /* ── Main ── */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: var(--space-12) var(--space-8) var(--space-20);
    }

    /* ── Filters wrap ── */
    .filters-wrap { margin-bottom: var(--space-8); }

    /* ── Hamburger ── */
    .hamburger-btn {
      background: none; border: none; color: rgba(255,255,255,.9);
      font-size: var(--text-2xl); cursor: pointer; padding: var(--space-1) var(--space-2);
      line-height: 1; transition: opacity .2s; flex-shrink: 0;
    }
    .hamburger-btn:hover { opacity: .75; }

    /* ── Drawer ── */
    .drawer-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.5);
      z-index: 1001; opacity: 0; pointer-events: none; transition: opacity .3s;
    }
    .drawer-overlay.show { opacity: 1; pointer-events: all; }
    .drawer {
      position: fixed; top: 0; right: 0; height: 100%; width: 280px;
      background: var(--cream); border-left: 1px solid var(--sand-dark);
      z-index: 1002; transform: translateX(100%);
      transition: transform .3s ease;
      display: flex; flex-direction: column; box-shadow: var(--shadow-lg);
    }
    .drawer.open { transform: translateX(0); }
    .drawer-head {
      background: var(--terracotta); color: var(--white);
      padding: var(--space-4) var(--space-5);
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
      min-height: 64px;
    }
    .drawer-logo { font-family:var(--font-display); font-size:1.1rem; font-weight:700; }
    .drawer-logo span { color: var(--sand); }
    .drawer-x { background:none; border:none; color:var(--white); font-size:var(--text-xl); cursor:pointer; padding:.15rem var(--space-2); line-height:1; }
    .drawer-nav { list-style:none; flex:1; overflow-y:auto; padding:var(--space-2) 0; }
    .drawer-nav li a {
      display:flex; align-items:center; gap:var(--space-3);
      padding:var(--space-4) var(--space-5); color:var(--ink); text-decoration:none;
      font-size:.95rem; font-family:var(--font-body); transition:background .15s;
    }
    .drawer-nav li a:hover { background: var(--sand); }
    .drawer-nav li a.current { color:var(--terracotta); font-weight:500; }

    /* ── Floating filter FAB ── */
    .filter-fab {
      position: fixed; bottom: 24px; left: 24px; z-index: 100;
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--terracotta); color: var(--white);
      border: none; cursor: pointer; font-size: 1.3rem;
      box-shadow: 0 4px 16px rgba(194,98,47,.45);
      display: flex; align-items: center; justify-content: center;
      transition: transform .2s, box-shadow .2s;
    }
    .filter-fab:hover { transform: scale(1.08); box-shadow: 0 6px 20px rgba(194,98,47,.55); }
    .filter-fab-badge {
      position: absolute; top: -4px; left: -4px;
      background: var(--olive); color: var(--white);
      font-size: .7rem; font-weight: 700;
      width: 20px; height: 20px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      border: 2px solid var(--white);
    }

    /* ── Filter modal ── */
    .filter-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      z-index: 410; opacity: 0; pointer-events: none; transition: opacity .25s;
    }
    .filter-overlay.show { opacity: 1; pointer-events: all; }
    .filter-modal {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--white); border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      z-index: 411; transform: translateY(100%);
      transition: transform .3s ease;
      max-height: 85vh; display: flex; flex-direction: column;
      box-shadow: var(--shadow-lg);
    }
    .filter-modal.open { transform: translateY(0); }
    .filter-modal-head {
      padding: var(--space-4) var(--space-5); border-bottom: 1px solid var(--sand);
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .filter-modal-head h3 { font-family:var(--font-display); font-size:1.1rem; font-weight:600; }
    .filter-modal-close { background:none; border:none; font-size:1.2rem; cursor:pointer; color:var(--ink-muted); padding:var(--space-1) var(--space-2); }
    .filter-modal-body { padding: var(--space-5); overflow-y: auto; flex: 1; }
    .filter-group { margin-bottom: var(--space-4); }
    .filter-group label { display:block; font-size:.82rem; font-weight:600; color:var(--ink-light); margin-bottom:var(--space-2); }
    .filter-group select {
      width: 100%; padding: var(--space-3) var(--space-4);
      border: 1.5px solid var(--sand-dark); border-radius: var(--radius);
      font-family:var(--font-body); font-size:.95rem; color:var(--ink);
      background: var(--white); outline: none; direction: rtl;
      transition: border-color .2s; cursor: pointer;
    }
    .filter-group select:focus { border-color: var(--terracotta); }
    .filter-modal-foot {
      padding: var(--space-4) var(--space-5); border-top: 1px solid var(--sand);
      display: flex; gap: var(--space-3); flex-shrink: 0;
    }
    .filter-modal-foot button {
      flex: 1; padding: var(--space-4); border-radius: var(--radius);
      font-family:var(--font-body); font-size:.95rem; font-weight:500; cursor:pointer; transition:all .2s;
    }
    .filter-clear-btn { background:var(--white); border:1.5px solid var(--sand-dark); color:var(--ink-light); }
    .filter-clear-btn:hover { border-color:var(--terracotta); color:var(--terracotta); }
    .filter-apply-btn { background:var(--terracotta); border:none; color:var(--white); }
    .filter-apply-btn:hover { background:var(--terracotta-light); }

    /* ── Favorites ── */
    .fav-btn {
      position: absolute; top: .5rem; left: .5rem;
      background: rgba(255,255,255,.85); border: none; border-radius: 50%;
      width: 32px; height: 32px; display: flex; align-items:center; justify-content:center;
      cursor: pointer; font-size: var(--text-base); transition: all .2s; z-index: 2;
    }
    .fav-btn:hover { background: var(--white); transform: scale(1.12); }
    .fav-btn.fav-on { background: #FFF3CD; }

    .clear-btn {
      padding: var(--space-2) var(--space-4);
      border-radius: 50px;
      border: 1.5px solid var(--sand-dark);
      background: var(--white);
      color: var(--ink-muted);
      font-family: var(--font-body);
      font-size: .82rem;
      cursor: pointer;
      transition: all .2s;
      margin-right: auto;
    }
    .clear-btn:hover { border-color: var(--terracotta); color: var(--terracotta); }

    /* ── Section title ── */
    .section-header {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      margin-bottom: var(--space-8);
    }
    .section-title {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--ink);
      position: relative;
      display: inline-block;
      padding-bottom: var(--space-2);
    }
    .section-title::after {
      content: '';
      position: absolute;
      bottom: 0;
      right: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, var(--terracotta-light), var(--terracotta));
      border-radius: 2px;
    }
    .recipe-count {
      font-size: .9rem;
      color: var(--ink-muted);
    }

    /* ── Grid ── */
    .recipes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: var(--space-8);
    }

    /* ── Group header ── */
    .group-header {
      grid-column: 1 / -1;
      font-family: var(--font-display);
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--ink-light);
      padding: var(--space-3) 0 var(--space-2);
      border-bottom: 2px solid var(--sand-dark);
      margin-top: var(--space-3);
    }
    .group-header:first-child { margin-top: 0; }

    /* ── Card ── */
    .recipe-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: transform .25s, box-shadow .25s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
    }
    .recipe-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }
    .card-image {
      height: 200px;
      background: var(--sand);
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .card-image img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform .4s;
    }
    .recipe-card:hover .card-image img { transform: scale(1.05); }
    .card-image::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        transparent 50%,
        rgba(44, 31, 20, 0.25) 100%
      );
      pointer-events: none;
      z-index: 1;
      opacity: 0;
      transition: opacity .3s ease;
    }
    .recipe-card:hover .card-image::after { opacity: 1; }
    .card-placeholder {
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--sand) 0%, var(--terracotta-pale) 100%);
      font-size: 3.5rem;
    }
    .card-category {
      position: absolute;
      top: .75rem;
      right: .75rem;
      background: rgba(194, 98, 47, 0.92);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      color: var(--white);
      font-size: var(--text-xs);
      font-weight: 600;
      padding: var(--space-1) var(--space-4);
      border-radius: 50px;
      z-index: 2;
      letter-spacing: .02em;
    }
    .card-body {
      padding: var(--space-5) var(--space-6) var(--space-6);
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .card-title {
      font-family: var(--font-display);
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: var(--space-2);
      line-height: 1.4;
    }
    .card-desc {
      font-size: .88rem;
      color: var(--ink-muted);
      line-height: var(--leading-normal);
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-meta {
      display: flex;
      gap: var(--space-4);
      margin-top: var(--space-5);
      padding-top: var(--space-4);
      border-top: 1px solid var(--sand);
    }
    .meta-item {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-size: .82rem;
      color: var(--ink-light);
    }
    .meta-item svg { flex-shrink: 0; }
    .difficulty-badge {
      margin-right: auto;
      padding: var(--space-1) var(--space-3);
      border-radius: 50px;
      font-size: .78rem;
      font-weight: 600;
    }
    .difficulty-badge.easy   { background: #E8F5E9; color: #2E7D32; }
    .difficulty-badge.medium { background: #FFF8E1; color: #F57F17; }
    .difficulty-badge.hard   { background: #FFEBEE; color: #C62828; }

    /* ── Tags ── */
    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      margin-top: var(--space-4);
    }
    .tag {
      background: var(--sand);
      color: var(--ink-light);
      font-size: var(--text-xs);
      padding: var(--space-1) var(--space-3);
      border-radius: 50px;
    }

    /* ── View toggle ── */
    .view-toggle {
      display: flex;
      gap: var(--space-1);
      margin-inline-start: auto;
    }
    .view-btn {
      width: 34px; height: 34px;
      border-radius: 8px;
      border: 1.5px solid var(--sand-dark);
      background: var(--white);
      color: var(--ink-muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s;
      flex-shrink: 0;
    }
    .view-btn:hover { border-color: var(--terracotta); color: var(--terracotta); }
    .view-btn.active { background: var(--terracotta); border-color: var(--terracotta); color: var(--white); }

    /* ── List view ── */
    .recipes-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }
    .list-card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: stretch;
      overflow: hidden;
      transition: transform .2s, box-shadow .2s;
      min-height: 96px;
    }
    .list-card:hover { transform: translateX(-2px); box-shadow: var(--shadow-md); }
    .list-image {
      width: 130px;
      flex-shrink: 0;
      background: var(--sand);
      overflow: hidden;
      position: relative;
    }
    .list-image img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform .3s;
    }
    .list-card:hover .list-image img { transform: scale(1.05); }
    .list-placeholder {
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--sand) 0%, var(--terracotta-pale) 100%);
      font-size: 2.2rem;
    }
    .list-body {
      flex: 1;
      padding: var(--space-4) var(--space-5);
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
      overflow: hidden;
    }
    .list-title {
      font-family: var(--font-display);
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--ink);
    }
    .list-desc {
      font-size: .83rem;
      color: var(--ink-muted);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .list-meta {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-top: auto;
      flex-wrap: wrap;
    }
    .list-category-badge {
      background: var(--terracotta);
      color: var(--white);
      font-size: .72rem;
      font-weight: 600;
      padding: .18rem var(--space-3);
      border-radius: 50px;
    }
    .list-group-header {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--ink-light);
      padding: var(--space-2) 0 var(--space-2);
      border-bottom: 2px solid var(--sand-dark);
      margin-top: var(--space-2);
    }
    .list-group-header:first-child { margin-top: 0; }

    /* ── Empty / Loading ── */
    .state-box {
      grid-column: 1 / -1;
      text-align: center;
      padding: var(--space-20) var(--space-8);
      color: var(--ink-muted);
    }
    .state-box .icon { font-size: 3rem; margin-bottom: var(--space-4); }
    .state-box p { font-size: 1.05rem; }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--sand-dark);
      border-top-color: var(--terracotta);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto var(--space-4);
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ── */
    footer {
      background: var(--ink);
      color: rgba(255,255,255,.5);
      text-align: center;
      padding: var(--space-8);
      font-size: .85rem;
    }
    footer span { color: var(--terracotta-light); }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .hero { padding: var(--space-14) var(--space-5) var(--space-12); }
      main { padding: var(--space-8) var(--space-5) var(--space-16); }
      .recipes-grid { grid-template-columns: 1fr; gap: var(--space-5); }
      .chips-row { flex-wrap: nowrap; overflow-x: auto; padding-bottom: 2px; -webkit-overflow-scrolling: touch; }
      .chips-row::-webkit-scrollbar { display: none; }
      .list-image { width: 100px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <button class="hamburger-btn" onclick="toggleDrawer()" aria-label="תפריט">☰</button>
    <a href="index.html" class="logo" id="site-logo">מתכונים <span>מחושבים</span></a>
  </div>
</header>

<section class="hero" id="hero-section" style="background-image:url('https://res.cloudinary.com/dnrswj6aw/image/upload/v1776513274/recipes/blog_cover.png')">
  <div class="hero-overlay">
    <h1 class="hero-tagline" id="hero-title">מתכונים מחושבים</h1>
    <p class="hero-subtitle" id="hero-subtitle">המטבח פוגש טכנולוגיה</p>
  </div>
</section>

<main>
  <div class="filters-wrap">
    <div class="search-wrap">
      <input type="text" id="search-input" placeholder="חפש מתכון..." autocomplete="off" />
      <span class="search-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </span>
    </div>
  </div>

  <div class="section-header">
    <h2 class="section-title" id="section-title-text">כל המתכונים</h2>
    <span class="recipe-count" id="recipe-count"></span>
    <div class="view-toggle">
      <button class="view-btn" id="view-grid-btn" title="תצוגת כרטיסים" onclick="setView('grid')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <rect x="3" y="3" width="8" height="8" rx="1.5"/><rect x="13" y="3" width="8" height="8" rx="1.5"/>
          <rect x="3" y="13" width="8" height="8" rx="1.5"/><rect x="13" y="13" width="8" height="8" rx="1.5"/>
        </svg>
      </button>
      <button class="view-btn" id="view-list-btn" title="תצוגת רשימה" onclick="setView('list')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
          <circle cx="3" cy="6" r="1.5" fill="currentColor" stroke="none"/>
          <circle cx="3" cy="12" r="1.5" fill="currentColor" stroke="none"/>
          <circle cx="3" cy="18" r="1.5" fill="currentColor" stroke="none"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="recipes-grid" id="recipes-grid">
    <div class="state-box">
      <div class="spinner"></div>
      <p>טוען מתכונים...</p>
    </div>
  </div>
</main>

<button class="filter-fab" id="filter-fab" onclick="openFilterModal()" aria-label="סינון ומיון">
  🔧
  <span class="filter-fab-badge" id="filter-badge" style="display:none">0</span>
</button>

<footer>
  <p>מתכונים מחושבים &nbsp;|&nbsp; המטבח פוגש טכנולוגיה &nbsp;|&nbsp; ניר פוליטי &nbsp;© 2026</p>
</footer>

<!-- Drawer -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <div class="drawer-logo">מתכונים <span>מחושבים</span></div>
    <button class="drawer-x" onclick="closeDrawer()">✕</button>
  </div>
  <ul class="drawer-nav">
    <li><a href="#" onclick="showAllRecipes();closeDrawer();return false">🔍 כל המתכונים</a></li>
    <li><a href="#" onclick="showFavoritesView();closeDrawer();return false">⭐ מועדפים</a></li>
    <li><a href="fridge.html">🥦 מתכון לפי מצרכים</a></li>
    <li><a href="admin.html">⚙️ ניהול מתכונים</a></li>
  </ul>
</div>

<!-- Filter modal -->
<div class="filter-overlay" id="filter-overlay" onclick="closeFilterModal()"></div>
<div class="filter-modal" id="filter-modal">
  <div class="filter-modal-head">
    <h3>סינון ומיון</h3>
    <button class="filter-modal-close" onclick="closeFilterModal()">✕</button>
  </div>
  <div class="filter-modal-body">
    <div class="filter-group">
      <label>קטגוריה</label>
      <select id="modal-cat-select">
        <option value="">הכל</option>
      </select>
    </div>
    <div class="filter-group">
      <label>רמת קושי</label>
      <select id="modal-diff-select">
        <option value="">הכל</option>
        <option value="easy">קל</option>
        <option value="medium">בינוני</option>
        <option value="hard">מאתגר</option>
      </select>
    </div>
    <div class="filter-group">
      <label>זמן הכנה</label>
      <select id="modal-time-select">
        <option value="">כל הזמנים</option>
        <option value="short">עד 30 דק'</option>
        <option value="medium">30–60 דק'</option>
        <option value="long">שעה+</option>
      </select>
    </div>
    <div class="filter-group">
      <label>מיון</label>
      <select id="modal-sort-select">
        <option value="date-desc">חדש לישן</option>
        <option value="date-asc">ישן לחדש</option>
        <option value="diff-easy">קושי: קל → מאתגר</option>
        <option value="diff-hard">קושי: מאתגר → קל</option>
        <option value="time-asc">זמן: קצר → ארוך</option>
        <option value="time-desc">זמן: ארוך → קצר</option>
      </select>
    </div>
  </div>
  <div class="filter-modal-foot">
    <button class="filter-clear-btn" onclick="clearFilterModal()">נקה הכל</button>
    <button class="filter-apply-btn" onclick="applyFilterModal()">החל</button>
  </div>
</div>

<script src="config.js"></script>
<script>
  const API = CONFIG.API;
  const CATEGORY_EMOJI = {
    'אפייה': '🥐', 'עוגות': '🎂', 'עוגיות': '🍪', 'לחם': '🍞',
    'מרקים': '🍲', 'סלטים': '🥗', 'עיקריות': '🍽️', 'קינוחים': '🍮',
    'חטיפים': '🥨', 'שתייה': '🥤', 'ארוחת בוקר': '🍳',
  };
  const DIFFICULTY_LABEL = { easy: 'קל', medium: 'בינוני', hard: 'מאתגר' };
  const DIFF_ORDER = { easy: 0, medium: 1, hard: 2 };

  let allRecipes = [];
  let activeFilters = { search: '', category: '', difficulty: '', timeRange: '' };
  let sortBy = 'date-desc';
  let viewMode = localStorage.getItem('recipeViewMode') || 'list';
  let favMode = false;

  // ── Settings ──────────────────────────────────────────────────────────────────

  async function loadSettings() {
    try {
      const res = await fetch(`${API}/api/settings`);
      if (!res.ok) return;
      const s = await res.json();
      if (s.site_name) {
        document.title = `${s.site_name} — מתכונים ביתיים`;
        const logoEl = document.getElementById('site-logo');
        if (logoEl) logoEl.innerHTML = s.site_name.replace(/\s+/, ' <span>') + '</span>';
        const footerEl = document.getElementById('footer-name');
        if (footerEl) footerEl.textContent = s.site_name;
      }
      if (s.hero_title) { const el = document.getElementById('hero-title'); if (el) el.textContent = s.hero_title; }
      if (s.site_description) { const el = document.getElementById('hero-subtitle'); if (el) el.textContent = s.site_description; }
      const heroUrl = s.main_image_url || s.hero_image_url || s.hero_image;
      if (heroUrl) {
        const heroEl = document.getElementById('hero-section');
        if (heroEl) heroEl.style.backgroundImage = `url('${heroUrl.split('#')[0]}')`;
      }
    } catch {}
  }

  // ── Recipes ───────────────────────────────────────────────────────────────────

  async function loadRecipes() {
    try {
      const res = await fetch(`${API}/api/recipes`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      allRecipes = await res.json();
      buildCategoryOptions();
      render();
    } catch {
      document.getElementById('recipes-grid').innerHTML = `
        <div class="state-box">
          <div class="icon">⚠️</div>
          <p>לא הצלחנו לטעון את המתכונים. נסה שוב בעוד רגע.</p>
        </div>`;
    }
  }

  function buildCategoryOptions() {
    const cats = [...new Set(allRecipes.map(r => r.category).filter(Boolean))].sort();
    const sel = document.getElementById('modal-cat-select');
    if (!sel) return;
    sel.innerHTML = '<option value="">הכל</option>' +
      cats.map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join('');
  }

  // ── Favorites ─────────────────────────────────────────────────────────────────

  function getFavorites() { return JSON.parse(localStorage.getItem('recipeFavorites') || '[]'); }

  function toggleFav(id, e) {
    e.preventDefault(); e.stopPropagation();
    const favs = getFavorites();
    const idx = favs.indexOf(id);
    if (idx >= 0) favs.splice(idx, 1); else favs.push(id);
    localStorage.setItem('recipeFavorites', JSON.stringify(favs));
    const isFav = favs.includes(id);
    document.querySelectorAll(`.fav-btn[data-id="${id}"]`).forEach(btn => {
      btn.classList.toggle('fav-on', isFav);
      btn.title = isFav ? 'הסר ממועדפים' : 'הוסף למועדפים';
      btn.textContent = isFav ? '⭐' : '☆';
    });
    if (favMode) render();
  }

  function showFavoritesView() {
    favMode = true;
    document.getElementById('section-title-text').textContent = '⭐ מועדפים';
    render();
  }

  function showAllRecipes() {
    favMode = false;
    document.getElementById('section-title-text').textContent = 'כל המתכונים';
    render();
  }

  // ── Drawer ────────────────────────────────────────────────────────────────────

  function toggleDrawer() {
    document.getElementById('drawer').classList.contains('open') ? closeDrawer() : openDrawer();
  }
  function openDrawer() {
    document.getElementById('drawer').classList.add('open');
    document.getElementById('drawer-overlay').classList.add('show');
    document.body.style.overflow = 'hidden';
  }
  function closeDrawer() {
    document.getElementById('drawer').classList.remove('open');
    document.getElementById('drawer-overlay').classList.remove('show');
    document.body.style.overflow = '';
  }

  // ── Filter modal ──────────────────────────────────────────────────────────────

  function openFilterModal() {
    document.getElementById('modal-cat-select').value = activeFilters.category;
    document.getElementById('modal-diff-select').value = activeFilters.difficulty;
    document.getElementById('modal-time-select').value = activeFilters.timeRange;
    document.getElementById('modal-sort-select').value = sortBy;
    document.getElementById('filter-overlay').classList.add('show');
    document.getElementById('filter-modal').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeFilterModal() {
    document.getElementById('filter-overlay').classList.remove('show');
    document.getElementById('filter-modal').classList.remove('open');
    document.body.style.overflow = '';
  }
  function applyFilterModal() {
    activeFilters.category  = document.getElementById('modal-cat-select').value;
    activeFilters.difficulty = document.getElementById('modal-diff-select').value;
    activeFilters.timeRange = document.getElementById('modal-time-select').value;
    sortBy = document.getElementById('modal-sort-select').value;
    updateFilterBadge();
    closeFilterModal();
    render();
  }
  function clearFilterModal() {
    document.getElementById('modal-cat-select').value = '';
    document.getElementById('modal-diff-select').value = '';
    document.getElementById('modal-time-select').value = '';
    document.getElementById('modal-sort-select').value = 'date-desc';
  }
  function updateFilterBadge() {
    const count = [activeFilters.category, activeFilters.difficulty, activeFilters.timeRange]
      .filter(Boolean).length + (sortBy !== 'date-desc' ? 1 : 0);
    const badge = document.getElementById('filter-badge');
    badge.textContent = count;
    badge.style.display = count > 0 ? 'flex' : 'none';
  }

  // ── Filtering ─────────────────────────────────────────────────────────────────

  function filtered() {
    let list = allRecipes;
    if (favMode) {
      const favs = getFavorites();
      list = list.filter(r => favs.includes(r.id));
    }
    return list.filter(r => {
      if (activeFilters.difficulty && r.difficulty !== activeFilters.difficulty) return false;
      if (activeFilters.category   && r.category   !== activeFilters.category)  return false;
      if (activeFilters.timeRange) {
        const total = (r.prep_time || 0) + (r.cook_time || 0);
        if (activeFilters.timeRange === 'short'  && total > 30)             return false;
        if (activeFilters.timeRange === 'medium' && (total <= 30 || total > 60)) return false;
        if (activeFilters.timeRange === 'long'   && total <= 60)            return false;
      }
      if (activeFilters.search) {
        const q = activeFilters.search.toLowerCase();
        const inTitle = r.title.toLowerCase().includes(q);
        const inTags  = (r.tags || []).some(t => t.toLowerCase().includes(q));
        const inCat   = (r.category || '').toLowerCase().includes(q);
        if (!inTitle && !inTags && !inCat) return false;
      }
      return true;
    });
  }

  function getSorted(list) {
    return [...list].sort((a, b) => {
      switch (sortBy) {
        case 'date-asc':  return new Date(a.created_at) - new Date(b.created_at);
        case 'diff-easy': return (DIFF_ORDER[a.difficulty] ?? 1) - (DIFF_ORDER[b.difficulty] ?? 1);
        case 'diff-hard': return (DIFF_ORDER[b.difficulty] ?? 1) - (DIFF_ORDER[a.difficulty] ?? 1);
        case 'time-asc':  return ((a.prep_time||0)+(a.cook_time||0)) - ((b.prep_time||0)+(b.cook_time||0));
        case 'time-desc': return ((b.prep_time||0)+(b.cook_time||0)) - ((a.prep_time||0)+(a.cook_time||0));
        default:          return new Date(b.created_at) - new Date(a.created_at);
      }
    });
  }

  // ── Render ────────────────────────────────────────────────────────────────────

  function render() {
    const list    = getSorted(filtered());
    const grid    = document.getElementById('recipes-grid');
    const countEl = document.getElementById('recipe-count');

    countEl.textContent = list.length ? `${list.length} מתכונים` : '';

    if (!list.length) {
      grid.className = 'recipes-grid';
      grid.innerHTML = `
        <div class="state-box">
          <div class="icon">${favMode ? '⭐' : '🔍'}</div>
          <p>${favMode ? 'עדיין אין מועדפים. לחץ ☆ על מתכון כדי להוסיף.' : 'לא נמצאו מתכונים תואמים'}</p>
        </div>`;
      return;
    }

    const groupByDiff = sortBy === 'diff-easy' || sortBy === 'diff-hard';
    let currentDiff = null;
    let html = '';

    if (viewMode === 'list') {
      grid.className = 'recipes-list';
      for (const r of list) {
        if (groupByDiff && r.difficulty !== currentDiff) {
          currentDiff = r.difficulty;
          html += `<div class="list-group-header">${DIFFICULTY_LABEL[currentDiff] || currentDiff || 'ללא רמה'}</div>`;
        }
        html += listCardHtml(r);
      }
    } else {
      grid.className = 'recipes-grid';
      for (const r of list) {
        if (groupByDiff && r.difficulty !== currentDiff) {
          currentDiff = r.difficulty;
          html += `<div class="group-header">${DIFFICULTY_LABEL[currentDiff] || currentDiff || 'ללא רמה'}</div>`;
        }
        html += cardHtml(r);
      }
    }

    grid.innerHTML = html;
  }

  function setView(mode) {
    viewMode = mode;
    localStorage.setItem('recipeViewMode', mode);
    document.getElementById('view-grid-btn').classList.toggle('active', mode === 'grid');
    document.getElementById('view-list-btn').classList.toggle('active', mode === 'list');
    render();
  }

  function listCardHtml(r) {
    const totalMin  = (r.prep_time || 0) + (r.cook_time || 0);
    const timeStr   = totalMin ? `${totalMin} דק'` : '';
    const emoji     = CATEGORY_EMOJI[r.category] || '🍴';
    const diffLabel = DIFFICULTY_LABEL[r.difficulty] || '';
    const favs      = getFavorites();
    const isFav     = favs.includes(r.id);

    const imageHtml = r.image_url
      ? (() => {
          const base = r.image_url.split('#')[0];
          const m    = r.image_url.match(/#pos=(-?[\d.]+),(-?[\d.]+),([\d.]+)/);
          const style = m
            ? `style="object-position:${m[1]}% ${m[2]}%;transform:scale(${m[3]});transform-origin:${m[1]}% ${m[2]}%"`
            : '';
          return `<img src="${base}" alt="${esc(r.title)}" loading="lazy" ${style} />`;
        })()
      : `<div class="list-placeholder">${emoji}</div>`;

    return `
      <a class="list-card" href="recipe.html?id=${r.id}" style="position:relative">
        <div class="list-image">${imageHtml}</div>
        <div class="list-body">
          <div class="list-title">${esc(r.title)}</div>
          ${r.description ? `<div class="list-desc">${esc(r.description)}</div>` : ''}
          <div class="list-meta">
            ${r.category ? `<span class="list-category-badge">${esc(r.category)}</span>` : ''}
            ${timeStr ? `<span class="meta-item" style="font-size:.8rem">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
              </svg>${timeStr}</span>` : ''}
            ${diffLabel ? `<span class="difficulty-badge ${r.difficulty}" style="margin-right:0">${diffLabel}</span>` : ''}
          </div>
        </div>
        <button class="fav-btn" data-id="${r.id}" onclick="toggleFav(${r.id},event)" title="${isFav ? 'הסר ממועדפים' : 'הוסף למועדפים'}" style="top:.5rem;right:.5rem;left:auto">${isFav ? '⭐' : '☆'}</button>
      </a>`;
  }

  function cardHtml(r) {
    const totalMin  = (r.prep_time || 0) + (r.cook_time || 0);
    const timeStr   = totalMin ? `${totalMin} דק'` : '';
    const emoji     = CATEGORY_EMOJI[r.category] || '🍴';
    const diffLabel = DIFFICULTY_LABEL[r.difficulty] || '';
    const tags      = (r.tags || []).slice(0, 3);
    const favs      = getFavorites();
    const isFav     = favs.includes(r.id);

    const imageHtml = r.image_url
      ? (() => {
          const base = r.image_url.split('#')[0];
          const m    = r.image_url.match(/#pos=(-?[\d.]+),(-?[\d.]+),([\d.]+)/);
          const style = m
            ? `style="object-position:${m[1]}% ${m[2]}%;transform:scale(${m[3]});transform-origin:${m[1]}% ${m[2]}%"`
            : '';
          return `<img src="${base}" alt="${esc(r.title)}" loading="lazy" ${style} />`;
        })()
      : `<div class="card-placeholder">${emoji}</div>`;

    return `
      <a class="recipe-card" href="recipe.html?id=${r.id}">
        <div class="card-image">
          ${imageHtml}
          ${r.category ? `<span class="card-category">${esc(r.category)}</span>` : ''}
          <button class="fav-btn" data-id="${r.id}" onclick="toggleFav(${r.id},event)" title="${isFav ? 'הסר ממועדפים' : 'הוסף למועדפים'}">${isFav ? '⭐' : '☆'}</button>
        </div>
        <div class="card-body">
          <h3 class="card-title">${esc(r.title)}</h3>
          ${r.description ? `<p class="card-desc">${esc(r.description)}</p>` : ''}
          ${tags.length ? `<div class="card-tags">${tags.map(t => `<span class="tag">${esc(t)}</span>`).join('')}</div>` : ''}
          <div class="card-meta">
            ${timeStr ? `
            <span class="meta-item">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
              </svg>
              ${timeStr}
            </span>` : ''}
            ${r.servings ? `
            <span class="meta-item">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
              </svg>
              ${r.servings}
            </span>` : ''}
            ${diffLabel ? `<span class="difficulty-badge ${r.difficulty}">${diffLabel}</span>` : ''}
          </div>
        </div>
      </a>`;
  }

  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

  // ── Search ────────────────────────────────────────────────────────────────────

  let searchTimer;
  document.getElementById('search-input').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      activeFilters.search = e.target.value.trim();
      render();
    }, 200);
  });

  // ── Init ──────────────────────────────────────────────────────────────────────

  document.getElementById('view-grid-btn').classList.toggle('active', viewMode === 'grid');
  document.getElementById('view-list-btn').classList.toggle('active', viewMode === 'list');

  if (location.hash === '#favorites') {
    favMode = true;
    document.getElementById('section-title-text').textContent = '⭐ מועדפים';
  }

  loadSettings();
  loadRecipes();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/recipes-blog/sw.js').catch(() => {});
  }
</script>
</body>
</html>
