<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מתכון לפי מצרכים | מתכונים מחושבים</title>
  <meta name="description" content="הקלד מרכיבים שיש לך בבית — נמצא מתכונים שאפשר להכין עכשיו" />
  <meta property="og:title"       content="מתכון לפי מצרכים | מתכונים מחושבים" />
  <meta property="og:description" content="הקלד מרכיבים שיש לך בבית — נמצא מתכונים שאפשר להכין עכשיו" />
  <meta property="og:url"         content="https://politin85.github.io/recipes-blog/fridge.html" />
  <meta name="twitter:card"       content="summary" />
  <link rel="icon" href="favicon.ico" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#6B7A3A" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Secular+One&family=Rubik:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --terracotta:       #C2622F;
      --terracotta-light: #D97B4A;
      --terracotta-pale:  #F5E2D4;
      --olive:            #6B7A3A;
      --olive-light:      #8A9A50;
      --sand:             #F0E4CE;
      --sand-dark:        #E2CDA8;
      --cream:            #FAF6F0;
      --ink:              #2C1F14;
      --ink-light:        #5A4030;
      --ink-muted:        #9A7B65;
      --white:            #FFFFFF;
      --shadow-sm: 0 2px 8px rgba(44,31,20,.08);
      --shadow-md: 0 6px 24px rgba(44,31,20,.12);
      --shadow-lg: 0 16px 48px rgba(44,31,20,.16);
      --radius:    12px;
      --radius-lg: 20px;
    }
    html, body { overflow-x: hidden; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Rubik', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; }

    /* ── Header ── */
    header {
      background: var(--terracotta); padding: 0 1.25rem;
      position: sticky; top: 0; z-index: 100; overflow: hidden;
      box-shadow: 0 2px 12px rgba(44,31,20,.2);
    }
    .header-inner {
      max-width: 1100px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between; height: 64px; gap: .5rem;
    }
    .logo { font-family:'Secular One',sans-serif; font-size:1.4rem; font-weight:700; color:var(--white); text-decoration:none; white-space:nowrap; flex-shrink:0; }
    .logo span { color: var(--sand); }
    .back-btn {
      display:flex; align-items:center; gap:.45rem; flex-shrink:0;
      color:rgba(255,255,255,.85); text-decoration:none; font-size:.9rem; transition:color .2s; white-space:nowrap;
    }
    .back-btn:hover { color:var(--white); }
    @media (max-width: 480px) {
      .logo { font-size: 1rem; }
      .back-btn { font-size: .78rem; }
    }

    /* ── Hero ── */
    .hero {
      background: linear-gradient(135deg, var(--olive) 0%, #4A5828 100%);
      padding: 3.5rem 2rem 2.5rem; text-align: center; position: relative; overflow: hidden;
    }
    .hero::before {
      content:''; position:absolute; inset:0;
      background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Ccircle cx='30' cy='30' r='4'/%3E%3C/g%3E%3C/svg%3E");
      pointer-events:none;
    }
    .hero h1 {
      font-family:'Secular One',sans-serif;
      font-size:clamp(1.8rem,4vw,2.8rem); font-weight:700; color:var(--white); margin-bottom:.6rem; position:relative;
    }
    .hero p { font-size:1rem; color:rgba(255,255,255,.8); font-weight:300; position:relative; }

    /* ── Layout ── */
    .page-layout {
      max-width: 1100px; margin: 0 auto;
      padding: 2.5rem 2rem 5rem;
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 2.5rem;
      align-items: start;
    }
    @media (max-width: 860px) { .page-layout { grid-template-columns: 1fr; } }

    /* ── Picker card ── */
    .picker-card {
      background: var(--white); border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm); overflow: visible;
      position: sticky; top: 80px;
    }
    .picker-header {
      background: var(--olive); padding: 1.25rem 1.5rem;
      color: var(--white); border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    }
    .picker-header h2 {
      font-family:'Secular One',sans-serif; font-size:1.1rem; font-weight:600;
      margin-bottom: .75rem;
    }

    /* Free text search */
    .free-search-wrap { position: relative; }
    .free-search-inp {
      width:100%; padding:.65rem 1rem;
      border-radius:50px; border:none;
      font-family:'Rubik',sans-serif; font-size:.9rem;
      background:rgba(255,255,255,.2); color:var(--white);
      outline:none; direction:rtl;
    }
    .free-search-inp::placeholder { color:rgba(255,255,255,.6); }
    .free-search-inp:focus { background:rgba(255,255,255,.3); }

    .autocomplete-drop {
      position: absolute; top: calc(100% + 4px); right: 0; left: 0;
      background: var(--white); border: 1.5px solid var(--sand-dark);
      border-radius: var(--radius); box-shadow: var(--shadow-md);
      z-index: 200; overflow: hidden; max-height: 220px; overflow-y: auto;
    }
    .autocomplete-item {
      padding: .6rem 1rem; cursor: pointer; font-size: .9rem; color: var(--ink);
      border-bottom: 1px solid var(--sand); transition: background .15s;
    }
    .autocomplete-item:last-child { border-bottom: none; }
    .autocomplete-item:hover, .autocomplete-item.active { background: var(--cream); color: var(--terracotta); }

    .picker-body { padding: 1rem 1.5rem 1.5rem; }

    /* Chips */
    .selected-chips {
      display:flex; flex-wrap:wrap; gap:.4rem; min-height:32px; margin-bottom:.9rem;
    }
    .chip {
      display:flex; align-items:center; gap:.35rem;
      background:var(--terracotta-pale); color:var(--terracotta);
      border:1.5px solid var(--terracotta); border-radius:50px;
      font-size:.82rem; font-weight:500; padding:.3rem .75rem;
      cursor:pointer; transition:all .2s;
    }
    .chip:hover { background:var(--terracotta); color:var(--white); }
    .chip-x { font-size:.9rem; line-height:1; }
    .empty-chips { font-size:.83rem; color:var(--ink-muted); align-self:center; }

    /* Section label */
    .section-row {
      display:flex; justify-content:space-between; align-items:center;
      margin:.9rem 0 .5rem;
    }
    .section-label { font-size:.8rem; font-weight:600; color:var(--ink-muted); text-transform:uppercase; letter-spacing:.07em; }
    .show-all-btn {
      font-size:.78rem; background:none; border:1.5px solid var(--olive);
      color:var(--olive); border-radius:50px; padding:.2rem .75rem;
      cursor:pointer; font-family:'Rubik',sans-serif; transition:all .2s;
    }
    .show-all-btn:hover { background:var(--olive); color:var(--white); }

    /* Pills */
    .ing-group { display:flex; flex-wrap:wrap; gap:.4rem; margin-bottom:.6rem; }
    .ing-pill {
      padding:.35rem .9rem; border-radius:50px;
      border:1.5px solid var(--sand-dark);
      background:var(--white); color:var(--ink-light);
      font-family:'Rubik',sans-serif; font-size:.85rem;
      cursor:pointer; transition:all .2s; user-select:none;
    }
    .ing-pill:hover { border-color:var(--olive); color:var(--olive); }
    .ing-pill.selected { background:var(--olive); border-color:var(--olive); color:var(--white); }

    /* Pantry toggle */
    .pantry-toggle-row {
      display:flex; align-items:center; justify-content:space-between;
      padding:.6rem 0; margin:.6rem 0;
      border-top:1px solid var(--sand); border-bottom:1px solid var(--sand);
    }
    .pantry-label { font-size:.85rem; color:var(--ink-light); }
    .toggle-btn {
      padding:.3rem 1rem; border-radius:50px; font-family:'Rubik',sans-serif;
      font-size:.8rem; cursor:pointer; transition:all .2s;
      border:1.5px solid var(--sand-dark); background:var(--sand); color:var(--ink-muted);
    }
    .toggle-btn.on { background:var(--olive); border-color:var(--olive); color:var(--white); }

    /* ── Ingredient modal ── */
    .overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.45);
      display:flex; align-items:center; justify-content:center;
      z-index:300; opacity:0; pointer-events:none; transition:opacity .2s;
    }
    .overlay.show { opacity:1; pointer-events:all; }
    .ing-modal-dialog {
      background:var(--white); border-radius:var(--radius-lg);
      max-width:680px; width:95%; max-height:85vh;
      display:flex; flex-direction:column; box-shadow:var(--shadow-lg);
    }
    .ing-modal-head {
      padding:1.25rem 1.5rem; border-bottom:1px solid var(--sand);
      display:flex; justify-content:space-between; align-items:center; flex-shrink:0;
    }
    .ing-modal-head h3 { font-family:'Secular One',sans-serif; font-size:1.15rem; font-weight:600; }
    .ing-modal-close {
      background:none; border:none; font-size:1.4rem; cursor:pointer;
      color:var(--ink-muted); line-height:1; transition:color .2s; padding:.1rem .4rem;
    }
    .ing-modal-close:hover { color:var(--ink); }
    .ing-modal-body { overflow-y:auto; padding:1.25rem 1.5rem; }
    .ing-modal-cat { margin-bottom:1.25rem; }
    .ing-modal-cat-title {
      font-family:'Secular One',sans-serif; font-size:.95rem; font-weight:600;
      color:var(--ink); margin-bottom:.6rem; padding-bottom:.4rem;
      border-bottom:1.5px solid var(--sand);
    }

    /* ── Results ── */
    .results-area { min-height: 300px; }
    .results-header {
      display:flex; align-items:baseline; gap:.75rem; margin-bottom:1.5rem; flex-wrap:wrap;
    }
    .results-title { font-family:'Secular One',sans-serif; font-size:1.4rem; font-weight:600; }
    .results-count { font-size:.9rem; color:var(--ink-muted); }

    .recipe-card {
      background:var(--white); border-radius:var(--radius-lg);
      box-shadow:var(--shadow-sm); overflow:hidden;
      display:flex; margin-bottom:1.25rem;
      text-decoration:none; color:inherit;
      transition:transform .25s, box-shadow .25s;
    }
    .recipe-card:hover { transform:translateY(-3px); box-shadow:var(--shadow-md); }
    .card-thumb {
      width:130px; flex-shrink:0;
      background:var(--terracotta-pale);
      display:flex; align-items:center; justify-content:center;
      font-size:3rem; overflow:hidden;
    }
    .card-thumb img { width:100%; height:100%; object-fit:cover; }
    .card-body { flex:1; padding:1.1rem 1.4rem; }
    .card-top { display:flex; justify-content:space-between; align-items:flex-start; gap:.5rem; margin-bottom:.5rem; }
    .card-title { font-family:'Secular One',sans-serif; font-size:1.05rem; font-weight:600; line-height:1.3; }
    .card-desc { font-size:.88rem; color:var(--ink-muted); line-height:1.6; margin-bottom:.65rem;
      display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }

    .match-wrap { display:flex; align-items:center; gap:.75rem; margin-bottom:.6rem; }
    .match-label { font-size:.8rem; color:var(--ink-muted); white-space:nowrap; }
    .match-bar { flex:1; height:6px; background:var(--sand); border-radius:3px; overflow:hidden; }
    .match-fill { height:100%; border-radius:3px; transition:width .5s; }
    .match-pct { font-size:.85rem; font-weight:700; white-space:nowrap; }

    .missing-list { display:flex; flex-wrap:wrap; gap:.35rem; }
    .missing-chip {
      background:#fff0eb; color:var(--terracotta);
      border:1px solid var(--terracotta-pale);
      border-radius:50px; font-size:.75rem; padding:.2rem .65rem;
    }
    .missing-chip::before { content:'− '; }

    /* Empty / loading */
    .state-box { text-align:center; padding:5rem 2rem; color:var(--ink-muted); }
    .state-box .icon { font-size:3rem; margin-bottom:1rem; }
    .spinner {
      width:36px; height:36px; border:3px solid var(--sand-dark);
      border-top-color:var(--olive); border-radius:50%;
      animation:spin .8s linear infinite; margin:0 auto 1rem;
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    footer { background:var(--ink); color:rgba(255,255,255,.5); text-align:center; padding:2rem; font-size:.85rem; }
    footer span { color:var(--terracotta-light); }

    @media (max-width:640px) {
      .hero { padding:2.5rem 1.25rem 2rem; }
      .page-layout { padding:1.5rem 1.25rem 4rem; }
      .picker-card { position:static; }
      .card-thumb { width:90px; font-size:2rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="index.html" class="logo">מתכונים <span>מחושבים</span></a>
    <a href="index.html" class="back-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
      כל המתכונים
    </a>
  </div>
</header>

<section class="hero">
  <h1>מתכון לפי מצרכים 🥕</h1>
  <p>הקלד מרכיבים שיש לך — נמצא מה אפשר להכין</p>
</section>

<div class="page-layout">

  <!-- Ingredient picker -->
  <aside>
    <div class="picker-card">
      <div class="picker-header">
        <h2>המרכיבים שלי</h2>
        <div class="free-search-wrap">
          <input type="text" id="free-search" class="free-search-inp"
            placeholder="הקלד מרכיב, הפרד בפסיק..." autocomplete="off" />
          <div id="autocomplete-drop" class="autocomplete-drop" style="display:none"></div>
        </div>
      </div>

      <div class="picker-body">
        <div class="selected-chips" id="selected-chips">
          <span class="empty-chips">עדיין לא הוספת מרכיבים</span>
        </div>

        <div class="section-row" style="margin-top:.5rem">
          <span class="section-label">כל המרכיבים</span>
          <button class="show-all-btn" onclick="openIngModal()">הצג הכל</button>
        </div>

        <div class="pantry-toggle-row">
          <span class="pantry-label">כלול מוצרי יסוד בחיפוש % התאמה</span>
          <button id="pantry-toggle" class="toggle-btn" onclick="togglePantry()">כבוי</button>
        </div>
      </div>
    </div>
  </aside>

  <!-- Results -->
  <div class="results-area" id="results-area">
    <div class="state-box">
      <div class="icon">🥕</div>
      <p>הוסף מרכיבים כדי למצוא מתכונים</p>
    </div>
  </div>

</div>

<!-- Ingredient modal -->
<div class="overlay" id="ing-modal" onclick="if(event.target===this)closeIngModal()">
  <div class="ing-modal-dialog">
    <div class="ing-modal-head">
      <h3>כל המרכיבים</h3>
      <button class="ing-modal-close" onclick="closeIngModal()">✕</button>
    </div>
    <div id="ing-modal-body" class="ing-modal-body"></div>
  </div>
</div>

<footer>
  <p>מתכונים מחושבים &nbsp;|&nbsp; המטבח פוגש טכנולוגיה &nbsp;|&nbsp; ניר פוליטי &nbsp;© 2026</p>
</footer>

<script src="config.js"></script>
<script>
const API = CONFIG.API;
const CATEGORY_EMOJI = {
  'אפייה':'🥐','עוגות':'🎂','עוגיות':'🍪','לחם':'🍞',
  'מרקים':'🍲','סלטים':'🥗','עיקריות':'🍽️','קינוחים':'🍮',
  'חטיפים':'🥨','שתייה':'🥤','ארוחת בוקר':'🍳',
};
const DIFF_LABEL = { easy:'קל', medium:'בינוני', hard:'מאתגר' };

let allIngredients = [];
let displayGroups = {};   // display_name → [id, ...]
let selected = new Set(); // stores display_names
let pantryEnabled = false;
let autoSearchTimer = null;
let acSelectedIdx = -1;

// ── Ingredient categorization ─────────────────────────────────────────────────

function categorizeIng(name) {
  const n = name;
  if (/(עגבני|מלפפון|גזר|בצל|שום|פלפל.*ירוק|חסה|תרד|כרוב|קישוא|חציל|פטריה|סלרי|ברוקולי|כרישה|קולרבי|סלק|אספרגוס|ארטישוק|בטטה|תפוחי אדמה|דלע|שמפיניון|תירס|אפונה.*טרי|ראדיש)/.test(n)) return 'ירקות';
  if (/(תפוח|בננה|תות|לימון|תפוז|אבוקדו|מנגו|אוכמניות|פירות יער|צימוק|משמש|שזיף|אגס|ענבים|מלון|אבטיח|רימון|קיוי|אננס|פסיפלורה|ליים)/.test(n)) return 'פירות';
  if (/(גבינה|יוגורט|שמנת|ריקוטה|פרמזן|מוצרלה|גאודה|בולגרי|קוטג|מסקרפון|לבנה|חמאה|ביצ|חלב|קרם פרש)/.test(n)) return 'גבינות ומוצרי חלב';
  if (/(עוף|פרגית|בקר|כבש|טלה|טחון|נקניק|שוק|חזה|כנף|כבד|אנטריקוט|שניצל|סטייק|בשר|עגל|הודו)/.test(n)) return 'בשר ועוף';
  if (/(שרימפס|סלמון|טונה|דיונון|קלמרי|אנשובי|בקלה|מוסר|לוקוס|ברמונדי|פלמידה|אמנון|קרפיון|דג )/.test(n)) return 'דגים ופירות ים';
  if (/(עדשים|חומוס|שעועית|פול|קטניות|סויה|טופו|פולים)/.test(n)) return 'קטניות';
  if (/(קמח|אורז|פסטה|שיפון|כוסמת|קינואה|שיבולת שועל|פולנטה|קורנפלור|סולת|שמרים|מחמצת|גריסים|בורגול)/.test(n)) return 'דגנים וקמחים';
  if (/(פפריקה|כמון|כורכום|קינמון|אורגנו|בזיליקום|רוזמרין|טימין|עירית|פטרוזיליה|כוסברה|שמיר|נענע|זעתר|בהרת|קארי|צ.ילי|ג.ינג.ר|וניל|אגוז מוסקט|תבלין|כוכב אניס)/.test(n)) return 'תבלינים ועשבי תיבול';
  if (/(שמן|חומץ|רוטב|מיונז|חרדל|קטשופ|ציר|יין|בירה|מיץ|חלב קוקוס|שמן שומשום|טחינה|פסטו|האריסה)/.test(n)) return 'נוזלים ורטבות';
  return 'אחר';
}

// ── Load ingredients ──────────────────────────────────────────────────────────

fetch(`${API}/api/ingredients`)
  .then(r => r.json())
  .then(data => {
    allIngredients = data.sort((a, b) => (b.recipe_count || 0) - (a.recipe_count || 0));
    buildDisplayGroups();
  })
  .catch(() => {});

function buildDisplayGroups() {
  displayGroups = {};
  for (const i of allIngredients) {
    const dn = i.display_name || i.name;
    (displayGroups[dn] = displayGroups[dn] || []).push(i.id);
  }
}

function getDisplayName(id) {
  const ing = allIngredients.find(i => i.id === id);
  return ing ? (ing.display_name || ing.name) : null;
}

function getSelectedIds() {
  const ids = [];
  for (const dn of selected) {
    (displayGroups[dn] || []).forEach(id => ids.push(id));
  }
  return ids;
}

function syncPillsForDn(dn, sel) {
  (displayGroups[dn] || []).forEach(id => {
    document.querySelectorAll(`.ing-pill[data-id="${id}"]`).forEach(p =>
      p.classList.toggle('selected', sel)
    );
  });
}

// ── Free text search + autocomplete ──────────────────────────────────────────

const freeEl = document.getElementById('free-search');
const dropEl = document.getElementById('autocomplete-drop');

function showDrop(items) {
  const seen = new Set();
  const deduped = items.filter(i => {
    const dn = i.display_name || i.name;
    if (seen.has(dn)) return false;
    seen.add(dn); return true;
  });
  if (!deduped.length) { dropEl.style.display = 'none'; return; }
  dropEl.innerHTML = deduped.map(i => {
    const label = i.display_name || i.name;
    return `<div class="autocomplete-item" data-id="${i.id}" data-name="${i.name.replace(/"/g,'&quot;')}"
      onmousedown="pickAutocomplete(${i.id},'${i.name.replace(/'/g,"\\'")}',event)">${label}</div>`;
  }).join('');
  dropEl.style.display = 'block';
}

freeEl.addEventListener('focus', () => {
  acSelectedIdx = -1;
  const parts = freeEl.value.split(',');
  const cur = parts[parts.length - 1].trim();
  if (cur) return;
  const top = allIngredients.filter(i => !i.is_pantry_staple && !selected.has(i.display_name || i.name)).slice(0, 10);
  showDrop(top);
});

freeEl.addEventListener('input', () => {
  const parts = freeEl.value.split(',');
  const cur   = parts[parts.length - 1].trim();
  acSelectedIdx = -1;

  if (!cur) {
    const top = allIngredients.filter(i => !i.is_pantry_staple && !selected.has(i.display_name || i.name)).slice(0, 10);
    showDrop(top);
    return;
  }

  const matches = allIngredients
    .filter(i => !i.is_pantry_staple && !selected.has(i.display_name || i.name) &&
      (i.name.startsWith(cur) || (i.display_name || '').startsWith(cur)))
    .slice(0, 8);
  showDrop(matches);
});

freeEl.addEventListener('keydown', e => {
  const items = dropEl.querySelectorAll('.autocomplete-item');
  if (e.key === 'ArrowDown') {
    acSelectedIdx = Math.min(acSelectedIdx + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('active', i === acSelectedIdx));
    e.preventDefault();
  } else if (e.key === 'ArrowUp') {
    acSelectedIdx = Math.max(acSelectedIdx - 1, -1);
    items.forEach((el, i) => el.classList.toggle('active', i === acSelectedIdx));
    e.preventDefault();
  } else if (e.key === 'Enter' || e.key === ',') {
    if (acSelectedIdx >= 0 && items[acSelectedIdx]) {
      const el = items[acSelectedIdx];
      pickAutocomplete(parseInt(el.dataset.id), el.dataset.name, null);
    } else {
      const parts = freeEl.value.split(',');
      const cur = parts[parts.length - 1].trim();
      if (cur) {
        const match = allIngredients.find(i =>
          i.name.toLowerCase() === cur.toLowerCase() ||
          (i.display_name || '').toLowerCase() === cur.toLowerCase() ||
          i.name.startsWith(cur) || (i.display_name || '').startsWith(cur)
        );
        if (match) pickAutocomplete(match.id, match.name, null);
      }
    }
    if (e.key === 'Enter') e.preventDefault();
  } else if (e.key === 'Escape') {
    dropEl.style.display = 'none';
  }
});

freeEl.addEventListener('blur', () => setTimeout(() => { dropEl.style.display = 'none'; }, 150));

function pickAutocomplete(id, name, e) {
  if (e) e.preventDefault();
  const parts = freeEl.value.split(',');
  parts[parts.length - 1] = '';
  freeEl.value = parts.join(',').replace(/,\s*$/, '');
  dropEl.style.display = 'none';
  acSelectedIdx = -1;
  addIngredient(id, name);
}

// ── Add / remove ingredients ──────────────────────────────────────────────────

function addIngredient(id, name) {
  const dn = getDisplayName(id) || name;
  if (selected.has(dn)) return;
  selected.add(dn);
  renderChips();
  syncPillsForDn(dn, true);
  scheduleAutoSearch();
}

function removeChip(dn) {
  selected.delete(dn);
  renderChips();
  syncPillsForDn(dn, false);
  scheduleAutoSearch();
}

function toggleIngPill(id, name, btn) {
  const dn = getDisplayName(id) || name;
  if (selected.has(dn)) {
    selected.delete(dn);
    syncPillsForDn(dn, false);
    renderChips();
    scheduleAutoSearch();
  } else {
    selected.add(dn);
    syncPillsForDn(dn, true);
    renderChips();
    scheduleAutoSearch();
  }
}

function renderChips() {
  const wrap = document.getElementById('selected-chips');
  if (!selected.size) {
    wrap.innerHTML = '<span class="empty-chips">עדיין לא הוספת מרכיבים</span>';
    return;
  }
  wrap.innerHTML = [...selected].map(dn =>
    `<span class="chip" onclick="removeChip(${JSON.stringify(dn)})">${dn} <span class="chip-x">×</span></span>`
  ).join('');
}

// ── Pantry toggle ─────────────────────────────────────────────────────────────

function togglePantry() {
  pantryEnabled = !pantryEnabled;
  const btn = document.getElementById('pantry-toggle');
  btn.textContent = pantryEnabled ? 'דלוק' : 'כבוי';
  btn.classList.toggle('on', pantryEnabled);
  // re-run auto-search so results reflect pantry change immediately
  scheduleAutoSearch();
}

// ── Auto search (intersection) ────────────────────────────────────────────────

function scheduleAutoSearch() {
  clearTimeout(autoSearchTimer);
  if (!selected.size) { showInitialState(); return; }
  autoSearchTimer = setTimeout(autoSearch, 350);
}

async function autoSearch() {
  if (!selected.size) { showInitialState(); return; }
  document.getElementById('results-area').innerHTML =
    '<div class="state-box"><div class="spinner"></div><p>מחפש...</p></div>';
  try {
    const res = await fetch(`${API}/api/recipes/by-ingredients`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ingredient_ids: getSelectedIds(), include_pantry: pantryEnabled }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(res.status);
    renderResults(data);
  } catch {
    document.getElementById('results-area').innerHTML =
      '<div class="state-box"><div class="icon">⚠️</div><p>שגיאה בחיפוש — נסה שוב</p></div>';
  }
}

// ── Render results ────────────────────────────────────────────────────────────

function renderResults(recipes) {
  const area = document.getElementById('results-area');
  if (!recipes.length) {
    area.innerHTML = `
      <div class="state-box">
        <div class="icon">🤷</div>
        <p>לא נמצאו מתכונים עם המרכיבים שבחרת<br><small>נסה להוסיף עוד מרכיבים</small></p>
      </div>`;
    return;
  }
  area.innerHTML = `
    <div class="results-header">
      <h2 class="results-title">תוצאות לפי % התאמה</h2>
      <span class="results-count">${recipes.length} נמצאו</span>
    </div>
    ${recipes.map(r => recipeCardHtml(r)).join('')}`;
}

function recipeCardHtml(r) {
  const pct      = r.match_percent;
  const color    = pct === 100 ? '#2E7D32' : pct >= 80 ? '#6B7A3A' : '#E65100';
  const emoji    = CATEGORY_EMOJI[r.category] || '🍴';
  const totalMin = (r.prep_time || 0) + (r.cook_time || 0);
  const missing  = r.missing_ingredients || [];
  const imgHtml  = r.image_url
    ? `<img src="${r.image_url.split('#')[0]}" alt="${r.title}">`
    : emoji;

  return `
    <a class="recipe-card" href="recipe.html?id=${r.id}">
      <div class="card-thumb">${imgHtml}</div>
      <div class="card-body">
        <div class="card-top">
          <h3 class="card-title">${r.title}</h3>
          ${r.category ? `<span style="font-size:.78rem;color:var(--ink-muted);white-space:nowrap">${r.category}</span>` : ''}
        </div>
        ${r.description ? `<p class="card-desc">${r.description}</p>` : ''}
        ${pct !== undefined ? `
          <div class="match-wrap">
            <span class="match-label">התאמה</span>
            <div class="match-bar"><div class="match-fill" style="width:${pct}%;background:${color}"></div></div>
            <span class="match-pct" style="color:${color}">${pct}%</span>
          </div>
          ${missing.length
            ? `<div class="missing-list">${missing.map(m => `<span class="missing-chip">${m.name}</span>`).join('')}</div>`
            : `<div style="font-size:.82rem;color:#2E7D32;font-weight:500">✓ יש לך את כל המרכיבים!</div>`}
        ` : ''}
        <div style="display:flex;gap:1rem;margin-top:.6rem">
          ${totalMin ? `<span style="font-size:.8rem;color:var(--ink-muted)">⏱ ${totalMin} דק'</span>` : ''}
          ${r.difficulty ? `<span style="font-size:.8rem;color:var(--ink-muted)">${DIFF_LABEL[r.difficulty]||''}</span>` : ''}
        </div>
      </div>
    </a>`;
}

function showInitialState() {
  document.getElementById('results-area').innerHTML = `
    <div class="state-box"><div class="icon">🥕</div><p>הוסף מרכיבים כדי למצוא מתכונים</p></div>`;
}

// ── "Show all" modal ──────────────────────────────────────────────────────────

function openIngModal() {
  const nonPantry = allIngredients.filter(i => !i.is_pantry_staple);
  const buckets = {};
  for (const ing of nonPantry) {
    const cat = categorizeIng(ing.name);
    (buckets[cat] = buckets[cat] || []).push(ing);
  }
  const cats = Object.keys(buckets).sort((a, b) => {
    if (a === 'אחר') return 1;
    if (b === 'אחר') return -1;
    return a.localeCompare(b, 'he');
  });
  document.getElementById('ing-modal-body').innerHTML = cats.map(cat => {
    const sorted = buckets[cat].sort((a, b) => a.name.localeCompare(b.name, 'he'));
    const seenDn = new Set();
    const deduped = sorted.filter(i => {
      const dn = i.display_name || i.name;
      if (seenDn.has(dn)) return false;
      seenDn.add(dn); return true;
    });
    return `
      <div class="ing-modal-cat">
        <div class="ing-modal-cat-title">${cat}</div>
        <div class="ing-group">
          ${deduped.map(i => {
            const dn = i.display_name || i.name;
            return `<button class="ing-pill${selected.has(dn)?' selected':''}"
              data-id="${i.id}" data-name="${i.name.replace(/"/g,'&quot;')}"
              onclick="toggleIngModal(${i.id},'${i.name.replace(/'/g,"\\'")}',this)">${dn}</button>`;
          }).join('')}
        </div>
      </div>`;
  }).join('');
  document.getElementById('ing-modal').classList.add('show');
}

function closeIngModal() { document.getElementById('ing-modal').classList.remove('show'); }

function toggleIngModal(id, name, btn) {
  const dn = getDisplayName(id) || name;
  if (selected.has(dn)) {
    selected.delete(dn);
    btn.classList.remove('selected');
    syncPillsForDn(dn, false);
  } else {
    selected.add(dn);
    btn.classList.add('selected');
    syncPillsForDn(dn, true);
  }
  renderChips();
  scheduleAutoSearch();
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/recipes-blog/sw.js').catch(() => {});
}
</script>
