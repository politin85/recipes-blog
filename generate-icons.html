<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<button onclick="downloadAll()">Download Icons</button>
<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;
  ctx.fillStyle = '#C2622F';
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, s * 0.18);
  ctx.fill();
  ctx.font = `bold ${s * 0.55}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#FAF6F0';
  ctx.fillText('🍴', s / 2, s / 2 + s * 0.04);
}

drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));

function downloadAll() {
  ['c192','c512'].forEach(id => {
    const canvas = document.getElementById(id);
    const a = document.createElement('a');
    a.download = `icon-${canvas.width}.png`;
    a.href = canvas.toDataURL('image/png');
    a.click();
  });
}
</script>
</body>
</html>
